<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <p>{{ message }}</p>
        <p v-pre>{{ message }}</p>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return {
                    message: 'Hello Vue!'
                };
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
