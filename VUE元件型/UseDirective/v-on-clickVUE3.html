<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <button v-on:click="onClick">點擊</button>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            methods: {
                onClick: function (event) {
                    alert("button clicked!");
                }
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
