<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <div v-on:keyup.capture.stop="keyup">
            <input type="text" v-on:keyup="inputKeyup" />
            <input type="text" />
        </div>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            methods: {
                keyup: function (event) {
                    alert("keyup!");                    
                },
                inputKeyup: function () {
                    alert("input Keyup!");
                }
            },
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
