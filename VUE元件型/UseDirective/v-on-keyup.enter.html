<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="mb-3">
                <label class="form-label">姓名</label>
                <input class="form-control" v-on:keyup.enter="login" />
            </div>
            <div class="mb-3">
                <button class="btn btn-primary" v-on:click="login">登入</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script>
        var app = new Vue({
            el: '#app',
            methods: {
                login: function () {
                    alert("執行登入!");
                }
            },
        })
    </script>
</body>
</html>
