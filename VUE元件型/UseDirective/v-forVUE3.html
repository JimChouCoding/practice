<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div>
        <ul id="app">
            <li v-for="item in items">
                {{ item.brand }}
            </li>
        </ul>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return {                
                    items: [
                        { brand: 'Benz' },
                        { brand: 'BMW' },
                        { brand: 'Tesla' },
                    ]
                };
            },
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
