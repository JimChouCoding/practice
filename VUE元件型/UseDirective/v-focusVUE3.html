<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        姓名:<input type="text" /><br/>
        地址:<input type="text" v-focus /><br/>
        電話:<input type="text" /><br/>
        <p v-copy="'Hello, world!'">Click me to copy "Hello, world!"</p>
        <p v-highlight="'lightgreen'">Hover me to see a highlight!</p>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            directives: {                
                focus: {
                    mounted: (el) => {                        
                        el.focus();     // initiate focus for the element 
                    }
                },
                copy:{
                    mounted(el, binding) {
                        el.style.cursor = 'pointer'; // Make it obvious it's clickable
                        el.addEventListener('click', async () => {
                            try {
                                await navigator.clipboard.writeText(binding.value);
                                // Optional feedback
                                console.log(`Copied: ${binding.value}`);
                            } catch (err) {
                                console.error('Failed to copy:', err);
                            }
                        });
                    },
                    updated(el, binding) {
                        // Update the text to copy if the value changes
                        el.__copyText__ = binding.value;
                    },
                    unmounted(el) {
                        el.removeEventListener('click');
                    }
                },
                highlight:{
                    mounted(el, binding) {
                        const color = binding.value || 'yellow';
                        el.addEventListener('mouseenter', () => {
                            el.style.backgroundColor = color;
                        });
                        el.addEventListener('mouseleave', () => {
                            el.style.backgroundColor = '';
                        });
                    },
                    unmounted(el) {
                        // Clean up (optional)
                        el.removeEventListener('mouseenter', null);
                        el.removeEventListener('mouseleave', null);
                    }
                }
            }        
        };
        var app=Vue.createApp(vueApp).mount("#app");        
    </script>
</body>
</html>
