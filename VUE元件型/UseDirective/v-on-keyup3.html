<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <label>請輸入:</label>
        <input v-on:keyup="onKeyup(1, $event)" />
        <button disabled>Login</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script>
        var app = new Vue({
            el: '#app',
            methods: {
                onKeyup: function (arg, event) {
                    alert(arg);
                    alert(event.code)
                }
            },
        })
    </script>
</body>
</html>
