<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <label>請輸入:</label>
        <input v-on:keyup="onKeyup(1, $event)" />
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            methods: {
                onKeyup: function (arg, $event) {
                    alert(arg);
                    alert(event.code);
                }
            },
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
