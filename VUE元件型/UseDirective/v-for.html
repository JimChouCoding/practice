<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div>
        <ul id="app">
            <li v-for="item in items">
                {{ item.brand }}
            </li>
        </ul>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script>
        var app = new Vue({
            el: "#app",
            data: {
                items: [
                    { brand: 'Benz' },
                    { brand: 'BMW' },
                    { brand: 'Tesla' },
                ]
            },
        });
    </script>
</body>
</html>
