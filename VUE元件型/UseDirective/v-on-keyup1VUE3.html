<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous"/>
</head>
<body>
    <div id="app" class="container" style="width:30%">
        <h3 class="mb-3 text-center">登入網站</h3>
        <div class="form-floating mb-3">
            <input class="form-control" v-model="userName" v-on:keyup="enableLogin" v-on:keypress.enter="login" v-on:keypress.enter="login"/>        
            <label class="form-label">帳號:</label>
        </div>
        <div class="form-floating mb-3">
            <input class="form-control" type="password" v-model="password" v-on:keyup="enableLogin" v-on:keypress.enter="login"/>          
            <label class="form-label">密碼:</label>
        </div>                    
        <div class="mb-3">
            <button class="btn btn-primary" v-bind:disabled="disableLogin" v-on:click="login">Login</button>        
        </div>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return {
                    userName:"",
                    password:"",
                    disableLogin:true
                };
            },
            methods: {
                enableLogin: function (event) {
                    this.disableLogin = this.userName.length<=0 || this.password.length<=0;
                },
                login:function(){
                    alert("login");
                }
            },
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
