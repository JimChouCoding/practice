<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <div v-on:click="clickDiv">
            <a href="#" v-on:click.stop="clickHyperlink">Hyperlink</a>
        </div>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            methods: {
                clickDiv: function () {
                    alert("click div!");
                },
                clickHyperlink: function () {
                    alert("click Hyperlink!");
                }
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
