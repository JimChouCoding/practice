<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <h3 v-text="message"></h3>
        <h3 v-html="message"></h3>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return{
                    message: '<h1>Hello Vue!</h1>'
                };
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
