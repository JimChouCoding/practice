<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <p>Hello</p>
        <p ref="second">VUE!!</p>
        <div>
            <button v-on:click="getRef()">Get</button>
        </div>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {            
            methods: {
                getRef: function () {
                    alert(this.$refs.second.textContent);
                }
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
