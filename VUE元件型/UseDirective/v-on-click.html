<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <button v-on:click="onClick">點擊</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script>
        var app = new Vue({
            el: '#app',
            methods: {
                onClick: function (event) {
                    alert("button clicked!");
                }
            }
        })
    </script>
</body>
</html>
