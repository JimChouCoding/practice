<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <h3>{{ count }}</h3>
        <h3 v-once>{{ count }}</h3>
        <button v-on:click="add">加1</button>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return {
                    count: 0
                };
            },
            methods : {
                add: function() {
                    this.count++;
                }
            },
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
