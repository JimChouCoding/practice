<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <h3>{{ count + 1 }}</h3>
        <h3>{{ ok ? 'YES' : 'NO' }}</h3>
        <h3>{{ message.split(' ').reverse().join(' ') }}</h3>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return {
                    count: 0,
                    ok:true,
                    message: 'This is a book'
                };                
            },
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
