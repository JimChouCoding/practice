<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <style>
        [v-cloak] {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        The answer is:<span v-cloak> {{ answer }}</span>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        $(function () {
            setTimeout(`var vueApp={
                          data() {
                                return {
                                    answer:'Yes'
                                };
                            }
                        };
                        Vue.createApp(vueApp).mount('#app')`, 3000);
        });
    </script>
</body>
</html>
