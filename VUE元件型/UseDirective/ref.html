<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <p>Hello</p>
        <p ref="second">VUE!!</p>
        <div>
            <button @click="getRef()">Get</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script>
        var app = new Vue({
            el: "#app",
            data: {},
            methods: {
                getRef: function () {
                    alert(this.$refs.second.textContent);
                }
            }
        })
    </script>
</body>
</html>
