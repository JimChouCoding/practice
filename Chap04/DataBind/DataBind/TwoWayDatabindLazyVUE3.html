<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <p>LazyMessage:{{ LazyMessage }}</p>
        <input v-model.lazy="LazyMessage" type="text" /><br />
        <p>InstantMessage:{{ InstantMessage }}</p>
        <input v-model="InstantMessage" type="text" />
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
           data() {
                return {
                    LazyMessage: '',
                    InstantMessage: ''
                };
            }
        };
        var app=Vue.createApp(vueApp).mount("#app")
    </script>
</body>
</html>
