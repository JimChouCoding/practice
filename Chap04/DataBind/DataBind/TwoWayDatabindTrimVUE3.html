<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <input v-model.trim="message" />
        <div>字串長度:{{ message.length }}</div>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return {
                    message: ""
                };
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
