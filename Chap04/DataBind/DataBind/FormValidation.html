<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div id="app">
        <form ref="myForm" v-on:submit.prevent="validateForm" action="#" method="post">
            <div class="container" style="width:50%">
                <div v-if="errors.length>0" class="mb-3">
                    <b>請修正以下的錯誤:</b>
                    <ul>
                        <li v-for="error in errors" class="text-danger">{{ error }}</li>
                    </ul>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="name">Name</label>
                    <input class="form-control" id="name" v-model="name" type="text" name="name" />
                </div>
                <div class="mb-3">
                    <label class="form-label" for="age">Age</label>
                    <input class="form-control" id="age" v-model.number="age" type="number" name="age" min="0" />
                </div>
                <div class="mb-3">
                    <input type="submit" value="Submit" class="btn btn-primary"/>
                </div>
            </div>        
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.min.js"></script>
    <script>
        var app = new Vue({
            el: '#app',
            data: {
                errors: [],
                name: null,
                age: null,
            },
            methods: {
                validateForm: function (e) {
                    this.errors = [];
                    if (!this.name) {
                        this.errors.push('姓名未輸入');
                    }
                    if (!this.age) {
                        this.errors.push('年齡未輸入');
                    }
                    else if (this.age < 20 || this.age >=55){ 
                        this.errors.push('年齡不符');
                    }
                    if (this.errors.length==0) {
                        this.$refs.myForm.submit(); 
                    }                    

                }
            }
        })
    </script>
</body>
</html>
