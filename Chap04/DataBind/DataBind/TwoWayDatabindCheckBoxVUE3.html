<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <form action="#">
            <p>Languages: {{languages.join(', ')}}</p>
            <input type="checkbox" value="英文" v-model="languages" name="languages"/>英文
            <input type="checkbox" value="中文" v-model="languages" name="languages"/>中文<br />
        </form>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return {
                    languages: [],
                };                
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>

</html>
