<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="app">
        <div>選擇 = {{ selected }}</div>
        <select v-model="selected">
            <option>A</option>
            <option>B</option>
            <option>C</option>
        </select>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script>
        var vueApp = {
            data() {
                return {
                    selected: '未選擇'
                };
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
