<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div id="app">
        <form ref="myForm" v-on:submit.prevent="validateForm" action="https://localhost:7170/api/vue" method="post">
            <div class="container" style="width:30%">
                <h3 class="mt-3 text-center">資料輸入驗証</h3>
                <div v-if="errors.length>0" class="mb-3 text-danger">
                    <b>請修正以下的錯誤:</b>
                    <ul>
                        <li v-for="error in errors">{{ error }}</li>
                    </ul>
                </div>
                <div class="form-floating mb-3">
                    <input class="form-control" v-model.trim="name" name="name" type="text" />
                    <label class="form-label">姓名</label>
                </div>
                <div class="form-floating mb-3">
                    <input class="form-control" v-model.number="age" name="age" type="number" />
                    <label class="form-label">年齡</label>
                </div>
                <div class="mb-3">
                    <input type="submit" value="Submit" class="btn btn-primary" />
                </div>
            </div>
        </form>
    </div>
    <script src="https://unpkg.com/vue@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js" integrity="sha512-uMtXmF28A2Ab/JJO2t/vYhlaa/3ahUOgj1Zf27M5rOo8/+fcTUVH0/E0ll68njmjrLqOBjXM3V9NiPFL5ywWPQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        var vueApp = {
            data() {
                return {
                    errors: [],
                    name: null,
                    age: null,
                };
            },
            methods: {
                validateForm: function (e) {
                    this.errors = [];                   
                    if (this.name.length == 0) {
                        this.errors.push('姓名未輸入');
                        return false;
                    }
                    if (this.age < 20 || this.age >= 55) {
                        this.errors.push('年齡不符');
                        return false;
                    }
                    if (this.errors.length == 0) {
                        this.$refs.myForm.submit();
                    }                    
		            //if (this.name && this.age) {
              //          var uri="https://localhost:7170/api/vue";
              //          var data={
              //              name:this.name,
              //              age:this.age
              //          };
              //          axios.post(uri, data).then(response=>{
              //              alert(response.data);
              //          }).catch(err=>{
              //              alert(err);
              //          });
              //          //this.$refs.myForm.submit(); 
              //      }                  
                }
            }
        };
        var app=Vue.createApp(vueApp).mount("#app");
    </script>
</body>
</html>
