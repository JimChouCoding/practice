<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button2</title>
  </head>
  <body>
    <div id="app">
      <!--View-->
      <input type="checkbox" v-model="agree" />我已閱讀
      <button v-bind:disabled="!agree">購買</button>
    </div>

    <script src="https://unpkg.com/vue@3.5.22/dist/vue.global.js"></script>
    <script>
      var vueApp = {
        data() {
          return {
            //model
            agree: false,
          };
        },
        methods: {
          //controller
        },
      };
      var app = Vue.createApp(vueApp).mount("#app");
    </script>
  </body>
</html>
