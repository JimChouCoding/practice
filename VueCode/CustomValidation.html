<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CustomValidation</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="app" class="container" style="width: 40%">
      <!--View-->
      <form
        action="https://localhost:7170/api/Vue"
        method="post"
        v-on:submit.prevent="validate"
        ref="myForm"
      >
        <h3 class="mb-3 text-center">個人資訊</h3>
        <div v-if="errors.length > 0" class="mb-3 text-danger">
          <b>請修正以下的錯誤</b>
          <ul>
            <li v-for="error in errors">{{error}}</li>
          </ul>
        </div>
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            v-model.trim="name"
            name="name"
          />
          <label for="" class="form-label">姓名</label>
        </div>
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            v-model.number="age"
            name="age"
          />
          <label for="" class="form-label">年齡</label>
        </div>
        <div class="mb-3">
          <button class="btn btn-primary" type="submit">提交</button>
        </div>
      </form>
    </div>

    <script src="https://unpkg.com/vue@3.5.22/dist/vue.global.js"></script>
    <script>
      var vueApp = {
        data() {
          return {
            //model
            name: "",
            age: "",
            errors: [],
          };
        },
        methods: {
          //controller
          validate: function () {
            //alert("validate");
            this.errors = [];
            if (this.name.length == 0) {
              this.errors.push("姓名未填寫");
            }
            if (this.age < 20 || this.age >= 55) {
              this.errors.push("年齡不正確");
            }
            if (this.errors.length == 0) {
              this.$refs.myForm.submit();
            }
          },
        },
      };
      var app = Vue.createApp(vueApp).mount("#app");
    </script>
  </body>
</html>
