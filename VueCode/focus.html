<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus</title>
  </head>
  <body>
    <div id="app">
      <!--View-->
      <h2 v-highlight="" v-copy="'全端'">FUEN43</h2>
    </div>

    <script src="https://unpkg.com/vue@3.5.22/dist/vue.global.js"></script>
    <script>
      var vueApp = {
        data() {
          return {
            //model
            message: "Hello Vue!",
          };
        },
        methods: {
          //controller
        },
        directives: {
          focus: {
            mounted: (el) => {
              el.focus(); // initiate focus for the element
            },
          },
          copy: {
            mounted(el, binding) {
              el.style.cursor = "pointer"; // Make it obvious it's clickable
              el.addEventListener("click", async () => {
                try {
                  const text = el.innerText; //取得元素內容
                  await navigator.clipboard.writeText(text);
                  // Optional feedback
                  console.log(`Copied: ${text}`);
                } catch (err) {
                  console.error("Failed to copy:", err);
                }
              });
            },
            updated(el, binding) {
              // Update the text to copy if the value changes
              el.__copyText__ = binding.value;
            },
            unmounted(el) {
              el.removeEventListener("click");
            },
          },
          highlight: {
            mounted(el, binding) {
              const color = binding.value || "yellow";
              el.addEventListener("mouseenter", () => {
                el.style.backgroundColor = color;
              });
              el.addEventListener("mouseleave", () => {
                el.style.backgroundColor = "";
              });
            },
            unmounted(el) {
              // Clean up (optional)
              el.removeEventListener("mouseenter", null);
              el.removeEventListener("mouseleave", null);
            },
          },
        },
      };
      var app = Vue.createApp(vueApp).mount("#app");
    </script>
  </body>
</html>
