<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>v-on</title>
  </head>
  <body>
    <div id="app">
      <button v-on:click="submit">OK</button>
      <button @click="submit">OK</button>
    </div>

    <script src="https://unpkg.com/vue@3.5.22/dist/vue.global.js"></script>
    <script>
      var vueApp = {
        data() {
          return {
            //model
            message: "Hello Vue!",
          };
        },
        methods: {
          //controller
          submit: function () {
            alert("submit");
          },
        },
      };
      var app = Vue.createApp(vueApp).mount("#app");
    </script>
  </body>
</html>
